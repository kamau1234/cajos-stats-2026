// ─── Helpers ──────────────────────────────────────────────────────────────
function pName(n){return PLAYERS.find(x=>x.number===n)?.displayName||`#${n}`;}
function pBadge(n){return PLAYERS.find(x=>x.number===n)?.badge||null;}
function pNote(n){return PLAYERS.find(x=>x.number===n)?.note||null;}

function computeSeason(){
  const map={};
  GAMES.forEach(g=>g.playerStats.forEach(s=>{
    if(!map[s.number])map[s.number]={number:s.number,gp:0,pts:0,fg2:0,fg3:0,ft:0,fouls:0,foulOuts:0};
    const m=map[s.number];m.gp++;m.pts+=s.pts;m.fg2+=s.fg2;m.fg3+=s.fg3;m.ft+=s.ft;m.fouls+=s.fouls;
    if(s.foulOut)m.foulOuts++;
  }));
  return Object.values(map).map(p=>({...p,name:pName(p.number),badge:pBadge(p.number),note:pNote(p.number),ppg:+(p.pts/p.gp).toFixed(1),fpg:+(p.fouls/p.gp).toFixed(1),fgm:p.fg2+p.fg3}));
}

function assignShotsToQuarters(shots,qtotals){
  const thresholds=qtotals.reduce((a,q,i)=>[...a,(a[i-1]||0)+q],[]);
  const qShots=qtotals.map(()=>[]);let cum=0;
  shots.forEach(shot=>{
    let qi=thresholds.findIndex(t=>cum<t);if(qi===-1)qi=qShots.length-1;
    qShots[qi].push(shot);cum+=shot[1];
  });
  return qShots;
}

// ─── Chart components (pure SVG/CSS — no external lib needed) ─────────────
function BarChart({data,keys,colors,h=160}){
  const max=Math.max(1,...data.flatMap(d=>keys.map(k=>d[k]||0)));
  return(
    <div style={{display:"flex",gap:4,height:h,alignItems:"flex-end",padding:"0 2px 18px"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",minWidth:0}}>
          <div style={{flex:1,display:"flex",alignItems:"flex-end",gap:1,width:"100%"}}>
            {keys.map((k,ki)=>d[k]!=null&&d[k]>0&&(
              <div key={k} style={{flex:1,height:`${(d[k]/max)*100}%`,background:colors[ki],borderRadius:"3px 3px 0 0",minHeight:2,position:"relative"}}>
                <div style={{position:"absolute",top:-13,left:"50%",transform:"translateX(-50%)",fontSize:8,color:colors[ki],whiteSpace:"nowrap"}}>{d[k]}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:8.5,color:C.muted,marginTop:2,whiteSpace:"nowrap"}}>{d.name}</div>
        </div>
      ))}
    </div>
  );
}

function LineChart({data,lines,h=160}){
  const W=520,H=h,pad={l:22,r:8,t:14,b:20};const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const max=Math.max(1,...data.flatMap(d=>lines.map(l=>d[l.key]||0)));
  const gx=i=>pad.l+(data.length>1?(i/(data.length-1))*cw:cw/2);
  const gy=v=>pad.t+ch*(1-v/max);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {[0,25,50,75,100].map(p=><line key={p} x1={pad.l} y1={gy(max*p/100)} x2={W-pad.r} y2={gy(max*p/100)} stroke={C.border} strokeWidth={0.6}/>)}
      {lines.map(l=>{
        let d="";let mv=true;
        data.forEach((row,i)=>{const v=row[l.key];if(v!=null){d+=mv?`M${gx(i)},${gy(v)}`:`L${gx(i)},${gy(v)}`;mv=false;}else mv=true;});
        return(<g key={l.key}><path d={d} fill="none" stroke={l.color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>{data.map((row,i)=>row[l.key]!=null&&<circle key={i} cx={gx(i)} cy={gy(row[l.key])} r={3} fill={l.color}/>)}</g>);
      })}
      {data.map((d,i)=><text key={i} x={gx(i)} y={H-3} textAnchor="middle" fill={C.muted} fontSize={8.5}>{d.name}</text>)}
    </svg>
  );
}

function ShotTimeline({game}){
  if(!game.shots||!game.shots.length)
    return<div style={{color:C.muted,fontSize:11,padding:"14px 0",fontStyle:"italic"}}>{game.missing?"Shot sequence unavailable — scorecard not recovered.":"Shot sequence not available for G1–G2 (scorecards not yet uploaded)."}</div>;
  const allQs=game.quarters;
  const qtotals=allQs.map(q=>q.t);
  const qShots=assignShotsToQuarters(game.shots,qtotals);
  const scorers=Array.from(new Set(game.shots.map(s=>s[0]))).filter(n=>game.playerStats.find(p=>p.number===n&&p.pts>0));
  return(
    <div style={{marginTop:18}}>
      <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:10}}>SHOT FLOW BY QUARTER</div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>
        {qShots.map((shots,qi)=>{
          const qLabel=allQs[qi]?.q||`Q${qi+1}`;
          const qTotal=qtotals[qi];
          const loggedQ=shots.reduce((s,sh)=>s+sh[1],0);
          const isOT=qLabel==="OT";
          return(
            <div key={qi} style={{background:isOT?"rgba(245,158,11,.08)":C.cardAlt,border:`1px solid ${isOT?C.yellow:C.border}`,borderRadius:8,padding:"10px 10px 8px",minWidth:100,flexShrink:0}}>
              <div style={{fontSize:9,color:isOT?C.yellow:C.orange,letterSpacing:2,marginBottom:8,fontWeight:700}}>{qLabel} — {qTotal} PTS{loggedQ<qTotal?<span style={{color:C.muted}}>*</span>:""}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {shots.length===0?<div style={{fontSize:10,color:C.muted,fontStyle:"italic"}}>no log</div>:shots.map((sh,i)=><ShotChip key={i} n={sh[0]} pts={sh[1]}/>)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:10}}>
        {scorers.map(n=>(

          </div>
        ))}
        <div style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>
          ○ = circle chip · dashed = FT · solid border = 3-pointer
        </div>
      </div>
    </div>
  );
}

// ─── Quarter mini-bars for game log ──────────────────────────────────────
function QBars({game}){
  if(!game.quarters||game.quarters.length===0)return null;
  return(
    <div style={{display:"flex",gap:5,marginTop:10}}>
      {game.quarters.map(q=>{
        const isOT=q.q==="OT";const mx=Math.max(q.t,q.o,1);const pct=(q.t/mx)*100;
        const col=q.t>q.o?(isOT?C.yellow:C.orange):q.t<q.o?C.red:C.light;
        return(
          <div key={q.q} style={{flex:isOT?0.6:1,minWidth:isOT?28:0}}>
            <div style={{fontSize:8,color:isOT?C.yellow:C.muted,textAlign:"center",marginBottom:2,letterSpacing:1}}>{q.q}</div>
            <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:col}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:8,marginTop:1}}>
              <span style={{color:col,fontWeight:"bold"}}>{q.t}</span>
              <span style={{color:C.muted}}>{q.o}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

                        {g.id===9&&<div style={{marginTop:6,color:C.yellow}}>Opponent scored 0 — this may have been a forfeit before play began.</div>}
                        <div style={{marginTop:10,padding:"10px 14px",background:"rgba(0,0,0,.3)",borderRadius:6,borderLeft:`3px solid ${C.yellow}`}}>
                          <div style={{fontWeight:"bold",color:C.yellow,marginBottom:4}}>How to recover this scorecard:</div>
                          <div>1. Contact COMUDE: <span style={{color:C.teal}}>deporte.popular@comudepuertovallarta.gob.mx</span></div>
                          <div>2. Check WhatsApp group for the Liga Tucán 3ra Categoría for referee sheets</div>
                          <div>3. Ask referee coordinator — González Elvis or Villalobos Manuel appear in adjacent games</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
              const logged=g.playerStats.reduce((s,p)=>s+p.pts,0);
              const tfg2=g.playerStats.reduce((s,p)=>s+p.fg2,0);
              const tfg3=g.playerStats.reduce((s,p)=>s+p.fg3,0);
              const tft=g.playerStats.reduce((s,p)=>s+p.ft,0);
              const tpf=g.playerStats.reduce((s,p)=>s+p.fouls,0);
              const hasOT=g.quarters.some(q=>q.q==="OT");
              return(
                <div>
                  {/* Game header */}
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"13px 16px",marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,alignItems:"center",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,letterSpacing:1}}>
                          G{g.id} — CAJOS <span style={{color:g.result==="W"?C.green:C.red}}>{g.teamScore}</span> – <span style={{color:C.muted}}>{g.opponentScore}</span> {g.opponent.toUpperCase()}
                          {hasOT&&<span style={{fontSize:13,color:C.yellow,marginLeft:8}}>OT</span>}
                        </div>
                        <div style={{color:C.muted,fontSize:11,marginTop:2}}>{g.date} · {g.location}</div>
                        {g.refs&&<div style={{fontSize:11,color:C.light,marginTop:2}}>Árbitros: {g.refs.j1} &amp; {g.refs.j2}</div>}
                        {g.scoreNote&&<div style={{fontSize:10,color:C.yellow,marginTop:3}}>⚠ {g.scoreNote}</div>}
                      </div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:900,padding:"4px 12px",borderRadius:6,background:g.result==="W"?"rgba(34,197,94,.15)":"rgba(239,68,68,.15)",color:g.result==="W"?C.green:C.red,border:`1px solid ${g.result==="W"?"rgba(34,197,94,.3)":"rgba(239,68,68,.3)"}`}}>{g.result==="W"?"WIN":"LOSS"}</div>
                    </div>
                    {/* Quarter boxes */}
                    {g.quarters&&g.quarters.length>0&&<div style={{display:"grid",gridTemplateColumns:`repeat(${g.quarters.length},1fr)`,gap:7}}>
                      {g.quarters.map(q=>{
                        const mx=Math.max(q.t,q.o,1);const isOT=q.q==="OT";
                        const col=q.t>q.o?(isOT?C.yellow:C.orange):q.t<q.o?C.red:"#fff";
                        return(
                          <div key={q.q} style={{background:isOT?"rgba(245,158,11,.06)":C.cardAlt,border:isOT?`1px solid rgba(245,158,11,.3)`:"none",borderRadius:6,padding:"9px 10px"}}>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:isOT?C.yellow:C.muted,letterSpacing:2,marginBottom:5}}>{q.q}</div>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:col}}>{q.t}</span>
                              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:C.muted}}>{q.o}</span>
                            </div>
                            <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden",marginBottom:2}}><div style={{height:"100%",width:`${(q.t/mx)*100}%`,background:isOT?C.yellow:C.orange}}/></div>
                            <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${(q.o/mx)*100}%`,background:C.muted}}/></div>
                          </div>
                        );
                      })}
                    </div>}
                  </div>

                  {/* Player box score */}
                  <div style={S.sL}>PLAYER STATS</div>
                  <div style={{overflowX:"auto",marginBottom:16}}>
                    <table style={S.tbl}>
                      <thead><tr>{["#","PLAYER","PTS","FG2","FG3","FT","PF"].map((h,i)=><th key={h} style={S.th(false,i<2?"left":"center")}>{h}</th>)}</tr></thead>
                      <tbody>
                        {[...g.playerStats].sort((a,b)=>b.pts-a.pts).map((p,i)=>(
                          <tr key={p.number} className="hrow" style={{background:i%2===0?C.card:C.cardAlt}}>
                            <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:900,color:C.orange}}>{p.number}</td>
                            <td style={{...S.td("left"),color:"#fff",fontWeight:500}}>{pName(p.number)}{p.foulOut&&<span style={{marginLeft:7,fontSize:10,color:C.red,background:"rgba(239,68,68,.15)",padding:"1px 5px",borderRadius:3}}>FOULED OUT</span>}</td>
                            <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:19,fontWeight:900,color:p.pts>=20?C.yellow:p.pts>=10?C.orange:p.pts>0?"#fff":C.muted}}>{p.pts>0?p.pts:"—"}</td>
                            <td style={{...S.td("center"),color:p.fg2>0?C.light:C.muted}}>{p.fg2>0?p.fg2:"—"}</td>
                            <td style={{...S.td("center"),color:p.fg3>0?C.yellow:C.muted}}>{p.fg3>0?p.fg3:"—"}</td>
                            <td style={{...S.td("center"),color:p.ft>0?C.light:C.muted}}>{p.ft>0?p.ft:"—"}</td>
                            <td style={{...S.td("center"),color:p.fouls>=5?C.red:p.fouls>=4?C.orange:p.fouls>=3?C.yellow:p.fouls>0?C.light:C.muted,fontWeight:p.fouls>=4?"bold":"normal"}}>{p.fouls>0?p.fouls:"—"}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot>
                        <tr style={{background:"rgba(249,115,22,.07)",borderTop:`1px solid ${C.orange}`}}>
                          <td colSpan={2} style={{...S.td("left"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.orange,letterSpacing:2}}>TOTAL{logged<g.teamScore?` (${g.teamScore-logged} unattrib.)`:""}</td>
                          <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:19,fontWeight:900,color:C.orange}}>{logged}</td>
                          <td style={{...S.td("center"),color:C.light}}>{tfg2}</td>
                          <td style={{...S.td("center"),color:tfg3>0?C.yellow:C.muted}}>{tfg3>0?tfg3:"—"}</td>
                          <td style={{...S.td("center"),color:C.light}}>{tft}</td>
                          <td style={{...S.td("center"),color:tpf>=12?C.red:C.yellow}}>{tpf}</td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>

                  {/* Shot timeline */}
                  <ShotTimeline game={g}/>
                </div>
              );
            })()}
          </div>
        )}

        {/* ══ TRENDS ══ */}
        {tab==="trends"&&(
          <div>
            <div style={S.sL}>GAME TRENDS & PATTERNS · {GAMES.length} GAMES</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:C.orange,letterSpacing:2,marginBottom:3}}>Q4 SCORING BY GAME</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:10}}>
                  <span style={{color:C.orange}}>■ Cajos</span>&nbsp; <span style={{color:C.border}}>■ Opponent</span> — strong Q4 closers
                </div>
                <BarChart data={q4Data} keys={["Cajos","Opp"]} colors={[C.orange,C.border]} h={150}/>
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:C.orange,letterSpacing:2,marginBottom:3}}>SCORING LEADERS PER GAME</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,display:"flex",gap:10,flexWrap:"wrap"}}>
                  {TOP.map((n,i)=><span key={n} style={{color:TOP_COLORS[i]}}>■ #{n}</span>)}
                </div>
                <LineChart data={perGameData} lines={TOP.map((n,i)=>({key:pName(n),color:TOP_COLORS[i]}))} h={150}/>
              </div>
            </div>

            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:C.orange,letterSpacing:2,marginBottom:10}}>GAME-BY-GAME TEAM PERFORMANCE</div>
              <div style={{overflowX:"auto"}}>
                <table style={S.tbl}>
                  <thead><tr>{["G","OPPONENT","RES","Q1","Q2","Q3","Q4","FOR","AGNST","MARGIN","REFS"].map(h=><th key={h} style={S.th(false,"center")}>{h}</th>)}</tr></thead>
                  <tbody>
                    {GAMES.map((g,i)=>{
                      const margin=g.teamScore-g.opponentScore;
                      const regularQs=g.quarters.filter(q=>q.q!=="OT");
                      return(
                        <tr key={g.id} className="hrow" style={{background:i%2===0?C.card:C.cardAlt}}>
                          <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,color:C.orange}}>{g.id}</td>
                          <td style={{...S.td("center"),color:C.light,fontSize:11}}>{g.opponent}</td>
                          <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:g.result==="W"?C.green:C.red}}>{g.result}{g.quarters.some(q=>q.q==="OT")&&<span style={{fontSize:9,color:C.yellow,marginLeft:2}}>OT</span>}</td>
                          {regularQs.map(q=><td key={q.q} style={{...S.td("center"),color:q.t>q.o?C.green:q.t<q.o?C.red:C.light,fontWeight:"bold",fontSize:12}}>{q.t}</td>)}
                          <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:"#fff"}}>{g.teamScore}</td>
                          <td style={{...S.td("center"),color:C.muted}}>{g.opponentScore}</td>
                          <td style={{...S.td("center"),fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,color:margin>=0?C.green:C.red,fontWeight:"bold"}}>{margin>0?"+":""}{margin}</td>
                          <td style={{...S.td("center"),fontSize:10,color:C.muted}}>{g.refs?`${g.refs.j1.split(" ")[0]} & ${g.refs.j2.split(" ")[0]}`:"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"rgba(249,115,22,.06)",borderTop:`1px solid ${C.orange}`}}>
                      <td colSpan={3} style={{...S.td("center"),color:C.orange,fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:2}}>AVG</td>
                      {["Q1","Q2","Q3","Q4"].map(qk=>{const avg=(GAMES.reduce((s,g)=>{const q=g.quarters.find(x=>x.q===qk);return s+(q?q.t:0);},0)/GAMES.length).toFixed(1);return<td key={qk} style={{...S.td("center"),color:C.light,fontSize:12}}>{avg}</td>;})}
                      <td style={{...S.td("center"),color:C.orange,fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{AVG_PF}</td>
                      <td style={{...S.td("center"),color:C.muted}}>{AVG_PA}</td>
                      <td style={{...S.td("center"),color:C.green,fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>+{AVG_MARGIN}</td>
                      <td style={S.td("center")}/>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{title:"Q4 CLOSERS",c:C.green,pts:["Avg Q4: 10.1–6.4 pts — consistent finishers.","Best Q4: G6 vs Renegados 18–4. Best run: G9 (71 pts).","Only loss where team was outscored in Q4: G8."]},
               {title:"Q2 VULNERABILITY",c:C.yellow,pts:["Outscored in Q2 six times across the season.","G8 vs Commando Sport: 12–19 in Q2 — key to loss.","G11 vs Real Ixtapa: gave up 19 in Q2, couldn't hold OT."]},
               {title:"FOUL MANAGEMENT",c:C.red,pts:["Angel #91 (3.0 FPG) + Miguel #17 (2.0 FPG) are the risks.","Angel fouled out in G5. Near-foul-out several other games.","Both G9 and G10 saw Marlon hit 4 fouls — manage him early."]},
               {title:"STAR POWER",c:C.teal,pts:["Angel #91 (15.0) + Marlon #11 (14.4) = elite PPG duo.","Chavez #77 now 14 three-pointers on season — best perimeter option.","Best team output: 71 pts vs Estrella Roja (G9)."]}]
                .map(c=>(
                  <div key={c.title} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:c.c,letterSpacing:2,marginBottom:8}}>{c.title}</div>
                    {c.pts.map((pt,i)=><div key={i} style={{fontSize:11,color:C.light,marginBottom:5,paddingLeft:10,borderLeft:`2px solid ${c.c}`,lineHeight:1.5}}>{pt}</div>)}
                  </div>
                ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    // Remove loading screen and mount app
    document.getElementById('loading').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CajosStats));
  </script>
</body>
</html>
